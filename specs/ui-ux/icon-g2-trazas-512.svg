<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#020810"/>

  <!-- Chip body -->
  <rect x="150" y="150" width="212" height="212" rx="14" fill="#030e07" stroke="#00ff88" stroke-width="2.5"/>

  <!-- Pins — top -->
  <line x1="200" y1="96" x2="200" y2="150" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="240" y1="80" x2="240" y2="150" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="280" y1="80" x2="280" y2="150" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="320" y1="96" x2="320" y2="150" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>

  <!-- Pins — bottom -->
  <line x1="200" y1="362" x2="200" y2="420" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="240" y1="362" x2="240" y2="432" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="280" y1="362" x2="280" y2="432" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="320" y1="362" x2="320" y2="420" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>

  <!-- Pins — left -->
  <line x1="96"  y1="200" x2="150" y2="200" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="80"  y1="240" x2="150" y2="240" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="80"  y1="280" x2="150" y2="280" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="96"  y1="320" x2="150" y2="320" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>

  <!-- Pins — right -->
  <line x1="362" y1="200" x2="416" y2="200" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="362" y1="240" x2="432" y2="240" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="362" y1="280" x2="432" y2="280" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>
  <line x1="362" y1="320" x2="416" y2="320" stroke="#00ff88" stroke-width="8" stroke-linecap="round"/>

  <!-- Inner L-traces (circuit detail) -->
  <path d="M 190 190 L 190 230 L 230 230" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 322 190 L 322 230 L 282 230" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 190 322 L 190 282 L 230 282" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 322 322 L 322 282 L 282 282" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="3" stroke-linecap="round"/>

  <!-- Center square + dot -->
  <rect x="224" y="224" width="64" height="64" rx="6" fill="rgba(0,255,136,0.12)" stroke="#00ff88" stroke-width="2"/>
  <circle cx="256" cy="256" r="16" fill="#00ff88"/>

  <!-- Pad dots at pin ends -->
  <circle cx="200" cy="96"  r="6" fill="#00ff88"/>
  <circle cx="240" cy="80"  r="6" fill="#00ff88"/>
  <circle cx="280" cy="80"  r="6" fill="#00ff88"/>
  <circle cx="320" cy="96"  r="6" fill="#00ff88" opacity="0.5"/>
  <circle cx="200" cy="420" r="6" fill="#00ff88"/>
  <circle cx="240" cy="432" r="6" fill="#00ff88"/>
  <circle cx="280" cy="432" r="6" fill="#00ff88"/>
  <circle cx="320" cy="420" r="6" fill="#00ff88" opacity="0.5"/>
  <circle cx="96"  cy="200" r="6" fill="#00ff88"/>
  <circle cx="80"  cy="240" r="6" fill="#00ff88"/>
  <circle cx="80"  cy="280" r="6" fill="#00ff88"/>
  <circle cx="96"  cy="320" r="6" fill="#00ff88" opacity="0.5"/>
  <circle cx="416" cy="200" r="6" fill="#00ff88"/>
  <circle cx="432" cy="240" r="6" fill="#00ff88"/>
  <circle cx="432" cy="280" r="6" fill="#00ff88"/>
  <circle cx="416" cy="320" r="6" fill="#00ff88" opacity="0.5"/>
</svg>
