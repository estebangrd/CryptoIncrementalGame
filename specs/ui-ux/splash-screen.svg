<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="390" height="844" fill="#020810"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(0,255,136,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,255,136,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="390" height="844" fill="url(#grid)"/>

  <!-- Ambient glow center -->
  <ellipse cx="195" cy="422" rx="220" ry="220" fill="url(#glow)"/>

  <!-- ── CHIP ICON centered ── -->
  <g transform="translate(83, 302)">
    <!-- Chip body -->
    <rect x="40" y="40" width="142" height="142" rx="10" fill="#030e07" stroke="#00ff88" stroke-width="2"/>

    <!-- Pins top -->
    <line x1="73"  y1="6"  x2="73"  y2="40" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="0"  x2="100" y2="40" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="127" y1="0"  x2="127" y2="40" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="154" y1="6"  x2="154" y2="40" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>

    <!-- Pins bottom -->
    <line x1="73"  y1="182" x2="73"  y2="216" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="182" x2="100" y2="222" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="127" y1="182" x2="127" y2="222" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="154" y1="182" x2="154" y2="216" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>

    <!-- Pins left -->
    <line x1="4"   y1="73"  x2="40" y2="73"  stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="0"   y1="100" x2="40" y2="100" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="0"   y1="127" x2="40" y2="127" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="4"   y1="154" x2="40" y2="154" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>

    <!-- Pins right -->
    <line x1="182" y1="73"  x2="218" y2="73"  stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="182" y1="100" x2="222" y2="100" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="182" y1="127" x2="222" y2="127" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
    <line x1="182" y1="154" x2="218" y2="154" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>

    <!-- Inner L-traces -->
    <path d="M 60 60 L 60 88 L 88 88"   fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 162 60 L 162 88 L 134 88" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 60 162 L 60 134 L 88 134" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 162 162 L 162 134 L 134 134" fill="none" stroke="rgba(0,255,136,0.4)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Center square + dot -->
    <rect x="89" y="89" width="44" height="44" rx="5" fill="rgba(0,255,136,0.12)" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="111" cy="111" r="11" fill="#00ff88"/>

    <!-- Pad dots -->
    <circle cx="73"  cy="6"   r="4" fill="#00ff88"/>
    <circle cx="100" cy="0"   r="4" fill="#00ff88"/>
    <circle cx="127" cy="0"   r="4" fill="#00ff88"/>
    <circle cx="154" cy="6"   r="4" fill="#00ff88" opacity="0.5"/>
    <circle cx="73"  cy="216" r="4" fill="#00ff88"/>
    <circle cx="100" cy="222" r="4" fill="#00ff88"/>
    <circle cx="127" cy="222" r="4" fill="#00ff88"/>
    <circle cx="4"   cy="73"  r="4" fill="#00ff88"/>
    <circle cx="0"   cy="100" r="4" fill="#00ff88"/>
    <circle cx="0"   cy="127" r="4" fill="#00ff88"/>
    <circle cx="218" cy="73"  r="4" fill="#00ff88"/>
    <circle cx="222" cy="100" r="4" fill="#00ff88"/>
    <circle cx="222" cy="127" r="4" fill="#00ff88"/>
  </g>

  <!-- ── TITLE ── -->
  <!-- BLOCKCHAIN -->
  <text
    x="195" y="578"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    font-weight="700"
    fill="#00ff88"
    letter-spacing="8"
  >BLOCKCHAIN</text>

  <!-- TYCOON -->
  <text
    x="195" y="614"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    font-weight="700"
    fill="#00e5ff"
    letter-spacing="12"
  >TYCOON</text>

  <!-- Separator line under title -->
  <line x1="100" y1="630" x2="290" y2="630" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="195" y="652"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    fill="rgba(255,255,255,0.3)"
    letter-spacing="4"
  >MINE · TRADE · DOMINATE</text>

  <!-- Version / loading dots at bottom -->
  <circle cx="181" cy="760" r="3" fill="#00ff88" opacity="0.9"/>
  <circle cx="195" cy="760" r="3" fill="#00ff88" opacity="0.5"/>
  <circle cx="209" cy="760" r="3" fill="#00ff88" opacity="0.2"/>

  <!-- Corner accents -->
  <path d="M 20 20 L 20 50 M 20 20 L 50 20" stroke="rgba(0,255,136,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 370 20 L 370 50 M 370 20 L 340 20" stroke="rgba(0,255,136,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 20 824 L 20 794 M 20 824 L 50 824" stroke="rgba(0,255,136,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 370 824 L 370 794 M 370 824 L 340 824" stroke="rgba(0,255,136,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
